<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Selenium Demo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Flask Application with Multiple UI Elements</h1>
        
        <!-- Calculator Section -->
        <div class="section">
            <h2>Calculator</h2>
            <div class="calculator">
                <input type="number" id="num1" placeholder="First number">
                <input type="number" id="num2" placeholder="Second number">
                
                <div class="button-group">
                    <button onclick="calculate('add')">Add</button>
                    <button onclick="calculate('subtract')">Subtract</button>
                    <button onclick="calculate('multiply')">Multiply</button>
                    <button onclick="calculate('divide')">Divide</button>
                </div>
                
                <div id="result" class="result">Result will appear here</div>
            </div>
        </div>
        
        <!-- Form Section -->
        <div class="section">
            <h2>Contact Form</h2>
            <form id="contact-form" action="/submit_form" method="POST">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="4"></textarea>
                </div>
                
                <button type="submit">Submit</button>
            </form>
            <div id="form-result"></div>
        </div>
        
        <!-- Dynamic Content Section -->
        <div class="section">
            <h2>Dynamic Content</h2>
            <button id="toggle-button">Toggle Content</button>
            <div id="dynamic-content" class="hidden">
                <p>This content is dynamically shown/hidden!</p>
                <ul>
                    <li>Item 1</li>
                    <li>Item 2</li>
                    <li>Item 3</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // Calculator functionality
        function calculate(operation) {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            
            if (isNaN(num1) || isNaN(num2)) {
                document.getElementById('result').textContent = 'Please enter valid numbers';
                return;
            }
            
            fetch('/calculate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({num1, num2, operation})
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('result').textContent = 'Error: ' + data.error;
                } else {
                    document.getElementById('result').textContent = 'Result: ' + data.result;
                }
            })
            .catch(error => {
                document.getElementById('result').textContent = 'Error: ' + error;
            });
        }
        
        // Form submission handling
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            
            fetch('/submit_form', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(data => {
                document.getElementById('form-result').textContent = data;
            })
            .catch(error => {
                document.getElementById('form-result').textContent = 'Error: ' + error;
            });
        });
        
        // Toggle functionality
        document.getElementById('toggle-button').addEventListener('click', function() {
            const content = document.getElementById('dynamic-content');
            content.classList.toggle('hidden');
        });
    </script>
</body>
</html>
