services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # Configure KRaft mode (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Automatically create topic
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    # Create topic on startup
    command: >
      bash -c "
      /opt/kafka/bin/kafka-storage.sh format -t $$(/opt/kafka/bin/kafka-storage.sh random-uuid) -c /etc/kafka/kraft/server.properties &&
      /opt/kafka/bin/kafka-server-start.sh /etc/kafka/kraft/server.properties &
      sleep 10 &&
      /opt/kafka/bin/kafka-topics.sh --create --topic sms-payload --bootst***-server localhost:9092 --partitions 1 --replication-factor 1 --if-not-exists &&
      tail -f /dev/null
      "

volumes:
  kafka-data:
